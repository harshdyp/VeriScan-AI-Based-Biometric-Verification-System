version: "3.9"
services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - TESSERACT_CMD=/usr/bin/tesseract
    volumes:
      - ./:/app
  frontend:
    build: .
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - SMARTID_API_BASE=http://api:8000
    depends_on:
      - api
    volumes:
      - ./:/app


